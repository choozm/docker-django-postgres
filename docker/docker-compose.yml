services:
  web:
    build: ./app
    command: uv sync && echo "Hello, World!" && cd /usr/src/app && python manage.py runserver
    volumes:
      - ./app/:/usr/src/app/
    ports:
      - 8000:8000
    env_file:
      - .env.dev

networks:
  default:
    driver: bridge
    name: private_frontend
    external: true