services:
  web:
    command: gunicorn hello_django.wsgi:application --bind 0.0.0.0:8000
    image: choozm/docker-django-postgres:latest
    ports:
      - 8000:8000
    env_file:
      - .env
      - .env.prod
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  db:
    image: postgres:18-alpine
    volumes:
      - django_postgres_data:/var/lib/postgresql
    # Open port for development purpose. Comment out this in production.
    #ports:
    #  - 5432:5432
    env_file:
      - .env.prod.db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hello_django -d hello_django_prod"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  django_postgres_data:

networks:
  default:
    driver: bridge
    name: private_frontend
    external: true