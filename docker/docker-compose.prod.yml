services:
  web:
    #build: ./app
    command: uv run gunicorn hello_django.wsgi:application --bind 0.0.0.0:8000
    image: choozm/docker-django-postgres:latest-dev
    ports:
      - 8000:8000
    env_file:
      - .env.prod

  db:
    image: postgres:18
    volumes:
      - django_postgres_data:/var/lib/postgresql
    env_file:
      - .env.prod

volumes:
  django_postgres_data:

networks:
  default:
    driver: bridge
    name: private_frontend
    external: true